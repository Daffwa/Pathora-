{% extends "base.html" %}

{% block title %}Chat - Pathora{% endblock %}

{% block content %}
<section class="chat-page" id="chat-page">
    <aside class="conversation-panel">
        <div class="search-field chat-search">
            <label class="sr-only" for="message-search">Cari kontak atau pesan</label>
            <span class="search-icon"></span>
            <input id="message-search" type="search" placeholder="Cari kontak atau pesan...">
            <button class="chat-search-clear" id="chat-search-clear" type="button" aria-label="Bersihkan pencarian" hidden>&times;</button>
        </div>

        <div class="conversation-list" id="conversation-list"></div>
    </aside>

    <section class="chat-room" aria-label="Ruang chat">
        <header class="chat-room-header">
            <button type="button" class="chat-back-button" id="chat-back-button" hidden>
                <span class="back-icon" aria-hidden="true"></span>
                Kontak
            </button>
            <div class="chat-contact">
                <span class="avatar" id="chat-contact-avatar"></span>
                <div>
                    <strong id="chat-contact-name">Pilih percakapan</strong>
                    <span id="chat-contact-status">Pilih percakapan untuk mulai chat.</span>
                </div>
            </div>
            <div class="chat-tools">
                <button type="button" class="icon-button" aria-label="Video call"><span class="video-icon"></span></button>
                <button type="button" class="icon-button" aria-label="Telepon"><span class="phone-icon"></span></button>
                <button type="button" class="icon-button" aria-label="Menu lainnya"><span class="more-icon"></span></button>
            </div>
        </header>

        <div class="chat-messages" id="chat-messages"></div>

        <form class="chat-composer" id="chat-composer">
            <label class="sr-only" for="chat-message">Tulis pesan</label>
            <div class="chat-attachment-preview hidden" id="chat-attachment-preview" hidden></div>
            <p class="chat-attachment-error" id="chat-attachment-error" role="alert" hidden></p>
            <textarea id="chat-message" rows="3" placeholder="Tulis pesan..."></textarea>
            <p class="chat-input-hint">Tekan Enter untuk kirim, Shift + Enter untuk baris baru.</p>
            <input class="chat-file-input" id="chat-image-input" type="file" accept="image/*">
            <div class="chat-composer-actions">
                <div>
                    <button type="button" class="icon-button" id="chat-attachment-button" aria-label="Lampirkan file" aria-controls="chat-image-input"><span class="attach-icon"></span></button>
                    <button type="button" class="icon-button" aria-label="Pilih emoji"><span class="smile-icon"></span></button>
                    <button type="button" class="secondary-button compact"><span class="clock-icon"></span>Jadwalkan</button>
                </div>
                <button type="submit" class="primary-button compact">Kirim</button>
            </div>
        </form>
    </section>
</section>

<script>
    const conversations = {{ chat_conversations|tojson }};
    const initialSelectedConversationId = {{ selected_contact_id|tojson }};
    const sendMessageUrl = {{ url_for('send_chat_message')|tojson }};

    const chatPage = document.getElementById("chat-page");
    const chatForm = document.getElementById("chat-composer");
    const chatInput = document.getElementById("chat-message");
    const chatMessages = document.getElementById("chat-messages");
    const conversationList = document.getElementById("conversation-list");
    const chatBackButton = document.getElementById("chat-back-button");
    const searchInput = document.getElementById("message-search");
    const searchClearButton = document.getElementById("chat-search-clear");
    const contactAvatar = document.getElementById("chat-contact-avatar");
    const contactName = document.getElementById("chat-contact-name");
    const contactStatus = document.getElementById("chat-contact-status");
    const attachmentButton = document.getElementById("chat-attachment-button");
    const imageInput = document.getElementById("chat-image-input");
    const attachmentPreview = document.getElementById("chat-attachment-preview");
    const attachmentError = document.getElementById("chat-attachment-error");
    const allowedImageExtensions = [".jpg", ".jpeg", ".png", ".webp", ".gif"];
    const maxImageSize = 5 * 1024 * 1024;
    const jakartaTimeFormatter = new Intl.DateTimeFormat("id-ID", {
        timeZone: "Asia/Jakarta",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false,
    });
    let selectedConversationId = conversations.some((conversation) => conversation.id === initialSelectedConversationId)
        ? initialSelectedConversationId
        : (conversations[0] ? conversations[0].id : null);
    let filteredConversations = conversations;
    let selectedImage = null;
    const mobileChatQuery = window.matchMedia("(max-width: 768px)");
    let isChatRoomOpen = !mobileChatQuery.matches;

    function updateChatView() {
        const showRoom = !mobileChatQuery.matches || isChatRoomOpen;
        chatPage.classList.toggle("is-chat-open", showRoom);
        chatPage.classList.toggle("is-contact-list-open", !showRoom);
        chatBackButton.hidden = !mobileChatQuery.matches;
    }

    function openChatRoom() {
        isChatRoomOpen = true;
        updateChatView();
    }

    function showConversationList() {
        isChatRoomOpen = false;
        updateChatView();
        searchInput.focus();
    }

    function getSelectedConversation() {
        return conversations.find((conversation) => conversation.id === selectedConversationId) || null;
    }

    function normalizeText(value) {
        return String(value || "").toLowerCase().trim();
    }

    function conversationMatchesSearch(conversation, keyword) {
        const searchableText = [
            conversation.name,
            conversation.role,
            conversation.company,
            conversation.lastMessage,
        ].map(normalizeText);

        return searchableText.some((value) => value.includes(keyword));
    }

    function updateSearchClearButton() {
        searchClearButton.hidden = searchInput.value.trim() === "";
    }

    function getJakartaTimeLabel(date = new Date()) {
        return jakartaTimeFormatter.format(date).replace(/\./g, ":");
    }

    function formatFileSize(bytes) {
        if (bytes >= 1024 * 1024) {
            return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
        }

        return `${Math.max(1, Math.round(bytes / 1024))} KB`;
    }

    function showAttachmentError(message) {
        attachmentError.textContent = message;
        attachmentError.hidden = false;
    }

    function clearAttachmentError() {
        attachmentError.textContent = "";
        attachmentError.hidden = true;
    }

    function clearSelectedImage() {
        if (selectedImage) {
            URL.revokeObjectURL(selectedImage.previewUrl);
        }

        selectedImage = null;
        imageInput.value = "";
        attachmentPreview.replaceChildren();
        attachmentPreview.classList.add("hidden");
        attachmentPreview.hidden = true;
    }

    function setSelectedImage(file) {
        clearSelectedImage();
        clearAttachmentError();

        selectedImage = {
            file,
            previewUrl: URL.createObjectURL(file),
        };

        const previewImage = document.createElement("img");
        previewImage.className = "chat-attachment-thumb";
        previewImage.src = selectedImage.previewUrl;
        previewImage.alt = file.name;

        const previewMeta = document.createElement("div");
        previewMeta.className = "chat-attachment-meta";

        const previewName = document.createElement("strong");
        previewName.textContent = file.name;

        const previewSize = document.createElement("span");
        previewSize.textContent = formatFileSize(file.size);

        const removeButton = document.createElement("button");
        removeButton.type = "button";
        removeButton.className = "chat-attachment-remove";
        removeButton.dataset.removeImage = "true";
        removeButton.setAttribute("aria-label", "Hapus gambar");
        removeButton.textContent = "\u00d7";

        previewMeta.append(previewName, previewSize);
        attachmentPreview.replaceChildren(previewImage, previewMeta, removeButton);
        attachmentPreview.classList.remove("hidden");
        attachmentPreview.hidden = false;
    }

    function validateImageFile(file) {
        if (!file) {
            return false;
        }

        const fileName = file.name.toLowerCase();
        const hasAllowedExtension = allowedImageExtensions.some((extension) => fileName.endsWith(extension));
        const hasAllowedMimeType = ["image/jpeg", "image/png", "image/webp", "image/gif"].includes(file.type);

        if (!hasAllowedExtension || !hasAllowedMimeType) {
            clearSelectedImage();
            showAttachmentError("Hanya file gambar yang dapat dikirim.");
            return false;
        }

        if (file.size > maxImageSize) {
            clearSelectedImage();
            showAttachmentError("Ukuran gambar maksimal 5 MB.");
            return false;
        }

        return true;
    }

    function renderEmptyContactState() {
        const emptyState = document.createElement("div");
        emptyState.className = "chat-empty-contact-state";

        const title = document.createElement("p");
        title.className = "chat-empty-contact-title";
        title.textContent = "Kontak tidak ditemukan";

        const text = document.createElement("p");
        text.className = "chat-empty-contact-text";
        text.textContent = "Coba gunakan nama atau kata kunci lain.";

        emptyState.append(title, text);
        conversationList.appendChild(emptyState);
    }

    function renderConversationList() {
        conversationList.replaceChildren();

        if (!filteredConversations.length) {
            renderEmptyContactState();
            return;
        }

        filteredConversations.forEach((conversation) => {
            const button = document.createElement("button");
            button.className = "conversation-item";
            button.type = "button";
            button.dataset.conversationId = conversation.id;
            button.setAttribute("aria-pressed", String(conversation.id === selectedConversationId));

            if (conversation.id === selectedConversationId) {
                button.classList.add("active");
            }

            const avatar = document.createElement("span");
            avatar.className = "avatar small-avatar";
            avatar.textContent = conversation.avatar;

            const content = document.createElement("span");
            const name = document.createElement("strong");
            name.textContent = conversation.name;
            const lastMessage = document.createElement("small");
            lastMessage.textContent = conversation.lastMessage;
            content.append(name, lastMessage);

            const time = document.createElement("time");
            time.textContent = conversation.time;

            button.append(avatar, content, time);
            conversationList.appendChild(button);
        });
    }

    function renderChatHeader() {
        const conversation = getSelectedConversation();

        if (!conversation) {
            contactAvatar.textContent = "";
            contactName.textContent = "Pilih percakapan";
            contactStatus.textContent = "Pilih percakapan untuk mulai chat.";
            return;
        }

        contactAvatar.textContent = conversation.avatar;
        contactName.textContent = conversation.name;
        contactStatus.textContent = [conversation.role, conversation.status]
            .filter(Boolean)
            .join(" \u2022 ");
    }

    function appendImageToBubble(bubble, imageUrl, fileName) {
        const image = document.createElement("img");
        image.className = "chat-message-image";
        image.src = imageUrl;
        image.alt = fileName;
        image.addEventListener("error", () => {
            image.remove();
            const fallback = document.createElement("span");
            fallback.className = "chat-image-fallback";
            fallback.textContent = "Gambar tidak dapat dimuat.";
            bubble.prepend(fallback);
        });
        bubble.prepend(image);
    }

    function createMessageBubble(message) {
        const bubble = document.createElement("div");
        bubble.className = "chat-message-bubble";

        if (message.imageUrl) {
            bubble.classList.add("has-image");
            appendImageToBubble(
                bubble,
                message.imageUrl,
                message.imageName || "Gambar"
            );
        }

        if (message.text) {
            const text = document.createElement("p");
            text.textContent = message.text;
            bubble.appendChild(text);
        }

        return bubble;
    }

    function createTextBubble(message) {
        const text = document.createElement("p");
        text.textContent = message.text;
        return text;
    }

    function renderMessage(message, conversation) {
        const row = document.createElement("article");
        const isUser = message.sender === "user";
        row.className = `message-row ${isUser ? "outgoing" : "incoming"}`;

        if (!isUser) {
            const avatar = document.createElement("span");
            avatar.className = "avatar mini-avatar";
            avatar.textContent = conversation.avatar;
            row.appendChild(avatar);
        }

        const content = document.createElement("div");
        const shouldUseMediaBubble = Boolean(message.imageUrl);
        content.appendChild(shouldUseMediaBubble ? createMessageBubble(message) : createTextBubble(message));

        const time = document.createElement("time");
        time.textContent = message.time || "Baru saja";
        content.appendChild(time);

        row.appendChild(content);
        chatMessages.appendChild(row);
    }

    function renderMessages() {
        const conversation = getSelectedConversation();
        chatMessages.replaceChildren();
        chatInput.disabled = !conversation;

        if (!conversation) {
            const emptyState = document.createElement("div");
            emptyState.className = "chat-empty-state";
            emptyState.textContent = "Pilih percakapan untuk mulai chat.";
            chatMessages.appendChild(emptyState);
            return;
        }

        if (!conversation.messages.length) {
            const emptyState = document.createElement("div");
            emptyState.className = "chat-empty-state";
            emptyState.textContent = conversation.emptyText || "Belum ada pesan. Mulai percakapan ini.";
            chatMessages.appendChild(emptyState);
            return;
        }

        const dateChip = document.createElement("div");
        dateChip.className = "date-chip";
        dateChip.textContent = "Hari Ini";
        chatMessages.appendChild(dateChip);

        conversation.messages.forEach((message) => renderMessage(message, conversation));
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function renderChat() {
        renderConversationList();
        renderChatHeader();
        renderMessages();
        updateChatView();
    }

    function filterConversations(query) {
        const keyword = normalizeText(query);
        filteredConversations = keyword
            ? conversations.filter((conversation) => conversationMatchesSearch(conversation, keyword))
            : conversations;

        const selectedIsVisible = filteredConversations.some(
            (conversation) => conversation.id === selectedConversationId
        );

        if (!selectedIsVisible) {
            selectedConversationId = filteredConversations.length ? filteredConversations[0].id : null;
            clearSelectedImage();
            clearAttachmentError();
        }

        renderChat();
        updateSearchClearButton();
    }

    function selectConversation(conversationId) {
        if (selectedConversationId === conversationId) {
            openChatRoom();
            chatInput.focus();
            return;
        }

        selectedConversationId = conversationId;
        clearSelectedImage();
        clearAttachmentError();
        renderChat();
        openChatRoom();
        chatInput.focus();
    }

    function updateConversationAfterSend(conversation, message) {
        conversation.messages.push(message);
        conversation.lastMessage = message.text || "Mengirim gambar";
        conversation.time = message.contactTime || message.time || getJakartaTimeLabel();
        conversation.sortTime = message.createdAt || new Date().toISOString();
        conversations.sort((first, second) => String(second.sortTime || "").localeCompare(String(first.sortTime || "")));
        renderChat();
    }

    async function sendChatMessage() {
        const conversation = getSelectedConversation();
        const message = chatInput.value.trim();
        const image = selectedImage;

        if (!conversation || (!message && !image)) {
            return;
        }

        try {
            chatInput.disabled = true;
            const formData = new FormData();
            formData.append("contact_id", conversation.contactId);
            formData.append("message", message);
            if (image) {
                formData.append("image", image.file);
            }

            const response = await fetch(sendMessageUrl, {
                method: "POST",
                body: formData,
            });
            const data = await response.json().catch(() => ({}));

            if (!response.ok) {
                throw new Error(data.error || "Pesan belum bisa dikirim.");
            }

            conversation.threadId = data.thread_id;
            chatInput.value = "";
            clearSelectedImage();
            clearAttachmentError();
            updateConversationAfterSend(conversation, data.message);
        } catch (error) {
            showAttachmentError(error.message || "Pesan belum bisa dikirim. Silakan coba lagi.");
            renderChatHeader();
            renderMessages();
        }
    }

    chatForm.addEventListener("submit", (event) => {
        event.preventDefault();
        sendChatMessage();
    });

    chatInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
            event.preventDefault();
            sendChatMessage();
        }
    });

    searchInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
            event.preventDefault();
            filterConversations(searchInput.value);
        }

        if (event.key === "Escape") {
            searchInput.value = "";
            filterConversations("");
        }
    });

    searchInput.addEventListener("input", updateSearchClearButton);

    searchClearButton.addEventListener("click", () => {
        searchInput.value = "";
        filterConversations("");
        searchInput.focus();
    });

    attachmentButton.addEventListener("click", () => {
        imageInput.click();
    });

    chatBackButton.addEventListener("click", showConversationList);

    conversationList.addEventListener("click", (event) => {
        const conversationButton = event.target.closest
            ? event.target.closest("[data-conversation-id]")
            : null;

        if (!conversationButton) {
            return;
        }

        selectConversation(conversationButton.dataset.conversationId);
    });

    imageInput.addEventListener("change", () => {
        const file = imageInput.files[0];
        if (validateImageFile(file)) {
            setSelectedImage(file);
        }
    });

    mobileChatQuery.addEventListener("change", (event) => {
        isChatRoomOpen = !event.matches;
        updateChatView();
    });

    function handleRemoveSelectedImage(event) {
        event.preventDefault();
        event.stopPropagation();
        clearSelectedImage();
        clearAttachmentError();
        chatInput.focus();
    }

    document.addEventListener("click", (event) => {
        const removeButton = event.target.closest
            ? event.target.closest("[data-remove-image]")
            : null;
        if (!removeButton) {
            return;
        }

        handleRemoveSelectedImage(event);
    });

    clearSelectedImage();
    renderChat();
</script>
{% endblock %}
