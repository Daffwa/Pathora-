{% extends "base.html" %}

{% block title %}Chat - Pathora{% endblock %}

{% block content %}
<section class="chat-page" id="chat-page"
    data-conversations="{{ chat_conversations|tojson }}"
    data-selected-contact="{{ selected_contact_id|tojson }}"
    data-send-url="{{ url_for('send_chat_message') }}">
    <aside class="conversation-panel">
        <div class="search-field chat-search">
            <label class="sr-only" for="message-search">Cari kontak atau pesan</label>
            <span class="search-icon"></span>
            <input id="message-search" type="search" placeholder="Cari kontak atau pesan...">
            <button class="chat-search-clear" id="chat-search-clear" type="button" aria-label="Bersihkan pencarian" hidden>&times;</button>
        </div>

        <div class="conversation-list" id="conversation-list"></div>
    </aside>

    <section class="chat-room" aria-label="Ruang chat">
        <header class="chat-room-header">
            <button type="button" class="chat-back-button" id="chat-back-button" hidden>
                <span class="back-icon" aria-hidden="true"></span>
                Kontak
            </button>
            <div class="chat-contact">
                <span class="avatar" id="chat-contact-avatar"></span>
                <div>
                    <strong id="chat-contact-name">Pilih percakapan</strong>
                    <span id="chat-contact-status">Pilih percakapan untuk mulai chat.</span>
                </div>
            </div>
            <div class="chat-tools">
                <button type="button" class="icon-button" aria-label="Video call"><span class="video-icon"></span></button>
                <button type="button" class="icon-button" aria-label="Telepon"><span class="phone-icon"></span></button>
                <button type="button" class="icon-button" aria-label="Menu lainnya"><span class="more-icon"></span></button>
            </div>
        </header>

        <div class="chat-messages" id="chat-messages"></div>

        <form method="post" enctype="multipart/form-data" class="chat-composer" id="chat-composer">
            <label class="sr-only" for="chat-message">Tulis pesan</label>
            <div class="chat-attachment-preview hidden" id="chat-attachment-preview" hidden></div>
            <p class="chat-attachment-error" id="chat-attachment-error" role="alert" hidden></p>
            <textarea id="chat-message" rows="3" placeholder="Tulis pesan..."></textarea>
            <p class="chat-input-hint">Tekan Enter untuk kirim, Shift + Enter untuk baris baru.</p>
            <input class="chat-file-input" id="chat-image-input" type="file" accept="image/*">
            <div class="chat-composer-actions">
                <div>
                    <button type="button" class="icon-button" id="chat-attachment-button" aria-label="Lampirkan file" aria-controls="chat-image-input"><span class="attach-icon"></span></button>
                    <button type="button" class="icon-button" aria-label="Pilih emoji"><span class="smile-icon"></span></button>
                    <button type="button" class="secondary-button compact"><span class="clock-icon"></span>Jadwalkan</button>
                </div>
                <button type="submit" class="primary-button compact">Kirim</button>
            </div>
        </form>
    </section>
</section>
<script src="{{ url_for('static', filename='js/chat.js') }}" defer></script>
{% endblock %}
